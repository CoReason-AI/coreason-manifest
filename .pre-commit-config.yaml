repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          [pydantic>=2.0, pytest, types-PyYAML]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        types_or: [markdown, python]
  - repo: local
    hooks:
      - id: dependency-auditing
        name: Dependency Auditing Check
        entry: uv run deptry src/
        language: system
        pass_filenames: false
        types: [python]
      - id: schema-contracts
        name: Schema Contracts Check
        entry: uv run pytest tests/contracts/
        language: system
        pass_filenames: false
        types: [python]
        files: ^src/coreason_manifest/spec/.*$
