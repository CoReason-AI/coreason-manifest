coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0%
    patch:
      default:
        target: 0%

comment:
  layout: "reach,diff,flags,files,tree,footer"
  behavior: default
  require_changes: false

ignore:
  - "tests/**/*"
  - "scripts/**/*"
  - "docs/**/*"

github_checks:
  annotations: true
