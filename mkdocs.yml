  #     - Nodes: core/nodes.md
  # - Cognitive Engines:
  #     - Profiles & Fast Paths: core/cognitive_profiles.md
  #     - Reasoning Engines: core/engines.md
  #     - Tool Packs: core/tools.md
  # - Resilience & Governance:
  #     - Supervision & Error Handling: core/resilience.md
