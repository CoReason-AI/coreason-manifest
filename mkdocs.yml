site_name: CoReason Manifest
site_description: The Immutable Shared Kernel of the CoReason Ecosystem

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.instant

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            show_category_heading: true
            docstring_style: google
            separate_signature: true

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Architecture:
      - Shared Kernel: architecture/shared_kernel.md
  - Orchestration:
      - Defining Flows: orchestration/flows.md
      - Polymorphic Nodes: orchestration/nodes.md
      - Resilience & Supervision: orchestration/resilience.md
      - Recovery Strategies: orchestration/strategies.md
  - Agents:
      - Cognitive Profiles: agents/cognitive_profiles.md
      - Reasoning Engines: agents/reasoning_engines.md
  - Capabilities:
      - Actionable Interfaces: capabilities/tooling.md
  - Governance:
      - Organizational Guardrails: governance/policies.md
  - Interoperability:
      - Telemetry & Lineage: interop/telemetry.md
      - Cryptographic Integrity: interop/integrity.md
      - Real-Time Streams: interop/streams.md
  - Developer Tools:
      - Builder API: tools/builder_api.md
      - The CLI: tools/cli.md
      - The Visualizer: tools/visualizer.md
