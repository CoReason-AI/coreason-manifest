site_name: coreason_manifest
theme:
  name: material
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            show_category_heading: true
            docstring_style: google
            separate_signature: true
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: usage.md
      - CLI Reference: tools/cli.md
  - Agents:
      - Cognitive Profiles: agents/cognitive_profiles.md
      - Reasoning Engines: agents/reasoning_engines.md
  - Orchestration:
      - Flows & Topology: orchestration/flows.md
      - Node Types: orchestration/nodes.md
      - Resilience & Supervision: orchestration/resilience.md
      - Recovery Strategies: orchestration/strategies.md
  - Governance & Safety:
      - Organizational Guardrails: governance/policies.md
  - Capabilities:
      - Tooling & Actions: capabilities/tooling.md
  - Interoperability:
      - Telemetry & Lineage: interop/telemetry.md
      - Cryptographic Integrity: interop/integrity.md
      - Real-Time Streams: interop/streams.md
  - Developer Tools:
      - Builder API: tools/builder_api.md
      - Visualizer: tools/visualizer.md
      - CLI: tools/cli.md
  - API Reference:
      - Agents & Tools: reference/agents.md
      - Orchestration: reference/orchestration.md
  - Internal Architecture:
      - Shared Kernel Architecture: architecture/shared_kernel.md
      - Compliance & Integrity: interop/integrity.md
