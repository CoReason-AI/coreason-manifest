site_name: coreason_manifest
theme:
  name: material
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            show_category_heading: true
            docstring_style: google
            separate_signature: true
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: index.md
  - Architecture:
      - Core Philosophy: architecture/core_philosophy.md
      - Topology & State: architecture/topology_and_state.md
  # PHASE 2-6 TARGET STRUCTURE (Commented out until written)
