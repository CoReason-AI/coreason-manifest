name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }} - Resolution ${{ matrix.resolution }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13"]
        resolution: ["standard", "lowest-direct"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (standard)
        if: matrix.resolution == 'standard'
        run: uv sync

      - name: Install dependencies (lowest-direct)
        if: matrix.resolution == 'lowest-direct'
        run: uv sync --resolution lowest-direct

      - name: Ruff Check
        run: uv run ruff check .

      - name: Ruff Format Check
        run: uv run ruff format --check .

      - name: Mypy Check
        run: uv run mypy src/ tests/

      - name: Pytest
        run: uv run pytest -n auto --cov=src --cov-report=xml || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
