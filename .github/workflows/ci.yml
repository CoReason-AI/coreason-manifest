name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-audit:
    name: Lint and Audit (Zero-Pollution Tooling Injection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Ruff Check
        run: uvx ruff check .

      - name: Ruff Format Check
        run: uvx ruff format --check .

      - name: Mypy Check
        run: uvx mypy src/ tests/

      - name: Deptry Check
        run: uvx deptry src/

  schema-contracts:
    name: Schema Contracts (Semantic Backward-Compatibility)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Generate Schema
        run: uv run coreason-export

      - name: Diff Check
        run: git diff --exit-code coreason_ontology.schema.json

      - name: Semantic Diff Check
        run: uv run scripts/semantic_diff.py origin/main coreason_ontology.schema.json

  mcp-conformance:
    name: MCP Conformance (Protocol Health)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync

      - name: Start MCP Server
        run: |
          uv run coreason-mcp &
          sleep 5

      - name: MCP Ping
        run: uv run scripts/mcp_ping.py

  security-sast:
    name: Security SAST (AI-Specific Fuzzing & Architectural Gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Architectural Gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr diff ${{ github.event.pull_request.number }} | uv run scripts/evaluate_architecture.py
          else
            echo "Skipping PR diff for non-pull_request event"
          fi

      - name: Prompt/Template Fuzzing
        run: uv run scripts/llm_fuzz.py

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    needs: [lint-and-audit, schema-contracts]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14", "3.14t"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV

      - name: Pytest
        run: uv run pytest tests/ --cov=coreason_manifest --cov-report=xml --cov-fail-under=95

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  reproducible-builds:
    name: Reproducible Builds (Determinism Verification)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel
        run: uv build

      - name: Verify SHA256
        run: |
          sha256sum dist/*.whl