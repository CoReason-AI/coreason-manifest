name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-audit:
    name: Lint and Audit (Zero-Pollution Tooling Injection)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Ruff Check
        run: uvx ruff check .

      - name: Ruff Format Check
        run: uvx ruff format --check .

      - name: Mypy Check
        run: uv run mypy src/ tests/

      - name: Enforce Topological Reachability
        run: uv run python scripts/universal_ontology_compiler.py evaluate_topological_reachability

      - name: Enforce Cryptographic Determinism
        run: uv run python scripts/enforce_cryptographic_determinism.py

      - name: Setup Node.js (For json-schema-to-typescript)
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.1
        with:
          node-version: '24.x'

      - name: Setup Rust (For Cargo Typify/Fmt)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Install cargo-typify
        run: cargo install cargo-typify

      - name: Generate Cross-Language Bindings
        run: uv run python scripts/generate_cross_language_bindings.py

      - name: Enforce Absolute Type Isomorphism (Drift Guillotine)
        run: |
          git add bindings/
          # We ignore version changes in package.json and Cargo.toml as they are dynamic
          git diff --staged --exit-code -I '^  "version":' -I '^version ='

      - name: Deptry Check
        run: uv run deptry src/

      - name: Docs Audit
        run: uv run zensical build

      - name: Docs Link Validation
        uses: lycheeverse/lychee-action@f613c4a64e50d792e0b31ec34bbcbba12263c6a6 # v2.3.0
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,429
            --exclude-loopback
            --exclude 'npmjs\.com'
            '*.md'
            'docs/**/*.md'
          fail: true

  schema-contracts:
    name: Schema Contracts (Semantic Backward-Compatibility)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Generate Schema
        run: uv run python -c "import json; from coreason_manifest.utils.algebra import get_ontology_schema; schema = get_ontology_schema(); open('coreason_ontology.schema.json', 'w', encoding='utf-8').write(json.dumps(schema, indent=2, ensure_ascii=False) + '\n')"

      - name: Diff Check
        run: git diff --exit-code coreason_ontology.schema.json

  security-sast:
    name: Security SAST (AI-Specific Fuzzing & Architectural Gate)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install Dependencies
        run: uv sync --all-extras

      - name: Architectural Gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr diff ${{ github.event.pull_request.number }} | uv run python scripts/universal_ontology_compiler.py evaluate_architectural_manifold
          else
            echo "Skipping PR diff for non-pull_request event"
          fi

      - name: Instantiation Bounds Gate
        run: uv run python scripts/universal_ontology_compiler.py evaluate_ast_instantiation_bounds

      - name: Bandit Security Check
        run: uvx bandit -r src/ scripts/ tests/ -s B101,B404

  test-ubuntu:
    name: Test (Ubuntu) - Python ${{ matrix.python-version }}
    needs: [lint-and-audit, schema-contracts]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14", "3.14t"]

    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          if [ "${{ matrix.python-version }}" = "3.14t" ]; then
            uv sync --dev
          else
            uv sync --all-extras --dev
          fi

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV

      - name: Pytest
        run: |
          if [ "${{ matrix.python-version }}" = "3.14t" ]; then
            uv run pytest --cov-fail-under=0
          else
            uv run pytest
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-extended:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    needs: test-ubuntu
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.14", "3.14t"]
        exclude:
          - os: windows-latest
            python-version: "3.14t"

    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ matrix.python-version }}" = "3.14t" ]; then
            uv sync --dev
          else
            uv sync --all-extras --dev
          fi

      - name: Set PYTHON_GIL for Free-Threading
        if: matrix.python-version == '3.14t'
        shell: bash
        run: echo "PYTHON_GIL=0" >> $GITHUB_ENV

      - name: Pytest
        shell: bash
        run: |
          if [ "${{ matrix.python-version }}" = "3.14t" ]; then
            uv run pytest --cov-fail-under=0
          else
            uv run pytest
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  reproducible-builds:
    name: Reproducible Builds (Determinism Verification)
    needs: [test-ubuntu, test-extended]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Build wheel (attempt 1)
        run: |
          uv build --out-dir dist1
          sha256sum dist1/*.whl > dist1/checksums.txt

      - name: Build wheel (attempt 2)
        run: |
          uv build --out-dir dist2
          sha256sum dist2/*.whl > dist2/checksums.txt

      - name: Verify Deterministic Build
        run: |
          WHL1=$(basename dist1/*.whl)
          WHL2=$(basename dist2/*.whl)
          HASH1=$(sha256sum dist1/$WHL1 | awk '{print $1}')
          HASH2=$(sha256sum dist2/$WHL2 | awk '{print $1}')
          echo "Build 1: $HASH1  $WHL1"
          echo "Build 2: $HASH2  $WHL2"
          if [ "$HASH1" != "$HASH2" ]; then
            echo "CRITICAL: Non-deterministic build detected!"
            exit 1
          fi
          echo "Deterministic build verified."
