name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14", "3.14t"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Ruff Check
        run: uv run ruff check . --exclude=src/coreason_manifest/oversight,src/coreason_manifest/telemetry

      - name: Ruff Format Check
        run: uv run ruff format --check . --exclude=src/coreason_manifest/oversight,src/coreason_manifest/telemetry

      - name: Pytest
        run: uv run pytest tests/
