name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }} - Resolution ${{ matrix.resolution }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14"]
        resolution: ["standard", "lowest-direct"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (standard)
        if: matrix.resolution == 'standard'
        run: uv sync

      - name: Install dependencies (lowest-direct)
        if: matrix.resolution == 'lowest-direct'
        run: uv sync --resolution lowest-direct

      - name: Ruff Check
        run: uv run ruff check src/coreason_manifest/core/ pyproject.toml

      - name: Ruff Format Check
        run: uv run ruff format --check src/coreason_manifest/core/ pyproject.toml

      - name: Mypy Check
        run: uv run mypy src/coreason_manifest/core/ --follow-imports=silent

      - name: Pytest
        run: uv run pytest -n auto --cov=src --cov-report=xml || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true

  agentic-evals:
    name: Agentic UX Trajectory Evals
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync

      - name: Run Evals
        run: uv run pytest tests/test_basic.py -m "evals"
