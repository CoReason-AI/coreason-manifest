name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'
  workflow_dispatch:

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write # Required for PyPI OIDC Trusted Publishing and Sigstore
      pages: write    # Required for GitHub Pages deployment
      attestations: write # Requires Enterprise Cloud or public repo for SLSA Level 3 provenance
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@c95a14d0e5bab51a9f56296a4eb0e416910cd350 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v5.1.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build Artifacts
        run: uv build
      - name: Verify Topological Integrity Before Compilation
        run: uv run python scripts/universal_ontology_compiler.py evaluate_topological_reachability
      - name: Export JSON Schema
        run: uv run python -c "import json; from coreason_manifest.utils.algebra import get_ontology_schema; schema = get_ontology_schema(); open('coreason_ontology.schema.json', 'w', encoding='utf-8').write(json.dumps(schema, indent=2, ensure_ascii=False) + '\n')"

      - name: Generate SLSA Provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2.2.0
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.17.9
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Sign Wheel
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: >-
            dist/*.whl
            dist/*.tar.gz
          release-signing-artifacts: true
          source: false

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.1.4
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.sigstore.json
            coreason_ontology.schema.json
            sbom.spdx.json

      - name: Build Docs
        run: uv run zensical build --clean

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm Trusted Publishing
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@c95a14d0e5bab51a9f56296a4eb0e416910cd350 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.2.0
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install uv
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v5.1.0
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Export JSON Schema
        run: uv run python -c "import json; from coreason_manifest.utils.algebra import get_ontology_schema; schema = get_ontology_schema(); open('coreason_ontology.schema.json', 'w', encoding='utf-8').write(json.dumps(schema, indent=2, ensure_ascii=False) + '\n')"
      - name: Generate TypeScript Bindings from Schema
        run: uv run python scripts/generate_cross_language_bindings.py
      - name: Propagate License Files
        run: |
          cp LICENSE NOTICE bindings/typescript/
      - name: Sync Version from Tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd bindings/typescript
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish TypeScript Bindings
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd bindings/typescript
          npm ci
          npm run build
          # NOTE: npm provenance verification only supports public repositories.
          # Re-enable when the repository is made public.
          npm publish --access public --verbose

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for crates.io Trusted Publishing (OIDC)
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@c95a14d0e5bab51a9f56296a4eb0e416910cd350 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
      - name: Install uv
        uses: astral-sh/setup-uv@887a942a15af3a7626099df99e897a18d9e5ab3a # v5.1.0
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Install cargo-typify
        run: cargo install cargo-typify
      - name: Export JSON Schema
        run: uv run python -c "import json; from coreason_manifest.utils.algebra import get_ontology_schema; schema = get_ontology_schema(); open('coreason_ontology.schema.json', 'w', encoding='utf-8').write(json.dumps(schema, indent=2, ensure_ascii=False) + '\n')"
      - name: Generate Rust Bindings from Schema
        run: uv run python scripts/generate_cross_language_bindings.py
      - name: Propagate License Files
        run: |
          cp LICENSE NOTICE bindings/rust/
      - name: Sync Version from Tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd bindings/rust
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.0
        id: auth
      - name: Publish Rust Bindings
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cd bindings/rust
          cargo publish --allow-dirty

  publish-docs:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@c95a14d0e5bab51a9f56296a4eb0e416910cd350 # v2.19.1
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
