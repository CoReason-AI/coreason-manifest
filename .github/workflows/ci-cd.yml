# .github/workflows/ci-cd.yml

name: CI/CD Pipeline

on:
  push:
    branches: [ main, "version-*" ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Nightly build

jobs:
  fast-quality-gate:
    name: Fast Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Linting (Ruff)
        run: uv run ruff check src/ tests/

      - name: Formatting Check (Ruff)
        run: uv run ruff format --check src/ tests/

      - name: Type Checking (Mypy)
        run: uv run mypy src/

      - name: Unit & Integration Tests (Standard)
        # Exclude heavy/long running tests if separated in future
        run: uv run pytest --cov=coreason_manifest --cov-report=term-missing --cov-fail-under=95 -k "not benchmark and not fuzz"

  heavy-quality-gate:
    name: Heavy Quality Gate
    runs-on: ubuntu-latest
    needs: fast-quality-gate
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # Only run if benchmark tests exist (Phase 2)
      - name: Performance Benchmarks
        run: |
          if [ -d "tests/benchmarks" ] || ls tests/test_performance.py 1> /dev/null 2>&1; then
            uv run pytest tests/test_performance.py --benchmark-only
          else
            echo "No benchmarks found, skipping."
          fi

      # Only run if fuzzing tests exist (Phase 1)
      - name: Security Fuzzing
        run: |
          if [ -d "tests/fuzz" ] || ls tests/test_loader_fuzz.py 1> /dev/null 2>&1; then
            # Run fuzzing for a limited time/iterations for CI check
            uv run pytest tests/test_loader_fuzz.py
          else
            echo "No fuzzing tests found, skipping."
          fi
