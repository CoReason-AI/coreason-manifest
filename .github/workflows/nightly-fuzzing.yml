name: Nightly Deep Fuzzing (Hypothesis State-Space Exploration)

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 03:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  deep-fuzz:
    name: Deep Property-Based Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Deep Fuzzing (ci-deep profile)
        run: >-
          uv run pytest tests/fuzzing/
          --hypothesis-profile=ci-deep
          -x
          --tb=long
          --no-header
          -q

      - name: Upload Hypothesis Database
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hypothesis-counterexamples
          path: .hypothesis/
          retention-days: 30
