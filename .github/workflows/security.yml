name: Security & Audit

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly
  pull_request:
    paths:
      - 'uv.lock'
      - 'pyproject.toml'

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Export dependencies
        run: uv export --format requirements-txt --no-emit-workspace > reqs.txt

      - name: Run pip-audit
        run: uv run --with pip-audit pip-audit -r reqs.txt
