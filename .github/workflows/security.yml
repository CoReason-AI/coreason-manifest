name: Security & Audit

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly
  pull_request:
    paths:
      - 'uv.lock'
      - 'pyproject.toml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Export dependencies
        run: uv export --format requirements-txt --no-emit-workspace > reqs.txt

      - name: Run pip-audit
        run: uv run --with pip-audit pip-audit -r reqs.txt --ignore-vuln CVE-2026-4539

  osv-scan:
    name: OSV CVE Scan (Transitive Dependency Manifold)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Harden Runner (Endpoint Network Security)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: OSV Scan
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --lockfile=uv.lock
