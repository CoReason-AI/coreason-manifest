name: OSV-Scanner
on:
  push:
    branches: [main, coreason-develop]
  pull_request:
    branches: [main, coreason-develop]
  schedule:
    - cron: '0 0 * * 1' # Weekly on Mondays

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  scan:
    name: OSV-Scanner
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@daa2c68f50d845057895a9c300e42478481c1d26" # v1.9.1
