name: OSV-Scanner
on:
  push:
    branches: [main, coreason-develop]
  pull_request:
    branches: [main, coreason-develop]
  schedule:
    - cron: '0 0 * * 1' # Weekly on Mondays

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  scan:
    name: OSV-Scanner
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@764c91816374ff2d8fc2095dab36eecd42d61638 # v1.9.21


