name: OpenSSF Scorecard

on:
  # Run on changes to main branch
  branch_protection_rule:
  schedule:
    - cron: '15 6 * * 1' # Weekly on Monday at 06:15 UTC
  push:
    branches:
      - main

permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      # Required for uploading SARIF results to Code Scanning
      security-events: write
      # Required for publishing results (public repos only)
      id-token: write
      # Required for reading repo contents and commit history
      contents: read
      # Required for accessing OIDC token
      actions: read
      # Required for Scorecard Vulnerabilities check on private repos
      vulnerability-alerts: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: publish_results only works for public repos.
          # Set to true once the repository is made public.
          publish_results: false

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Upload Scorecard Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
