name: Scorecard supply-chain security
on:
  # For Branch-Protection check. Only the default branch is supported. See
  # https://github.com/ossf/scorecard-action#branch-protection
  branch_protection_rule:
  # To guarantee Maintained check is occasionally updated. See
  # https://github.com/ossf/scorecard-action#maintained
  schedule:
    - cron: '30 1 * * 6'
  push:
    branches: [ "main", "coreason-develop" ]

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write
      # Others are read-only
      contents: read
      actions: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # (Optional) "enable_publish_results" will publish results to OpenSSF Scorecard.
          # If you are working on a private repository, this should be set to "false".
          # See https://github.com/ossf/scorecard-action#publishing-results.
          publish_results: true

      - name: "Upload results"
        uses: github/codeql-action/upload-sarif@6bb03452f061539696ff75efb888a30644b1dce9 # v3.28.8
        with:
          sarif_file: results.sarif
