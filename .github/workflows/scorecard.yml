name: OpenSSF Scorecard

on:
  # Run on changes to main branch
  branch_protection_rule:
  schedule:
    - cron: '15 6 * * 1' # Weekly on Monday at 06:15 UTC
  push:
    branches:
      - main

permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      # Required for uploading SARIF results to Code Scanning
      security-events: write
      # Required for publishing results (public repos only)
      id-token: write
      # Required for reading repo contents and commit history
      contents: read
      # Required for accessing OIDC token
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.1
        continue-on-error: true
        with:
          results_file: results.sarif
          results_format: sarif
          # NOTE: For Private Repositories, the default GITHUB_TOKEN does not have
          # sufficient permissions for the GraphQL API used by Scorecard (e.g. ListCommits).
          # Create a Personal Access Token (PAT) with `repo` scope and store it as a secret
          # named SCORECARD_PAT for it to succeed.
          repo_token: ${{ secrets.SCORECARD_PAT != '' && secrets.SCORECARD_PAT || secrets.GITHUB_TOKEN }}
          # NOTE: publish_results only works for public repos.
          # Set to true once the repository is made public.
          publish_results: false



      - name: Upload Scorecard Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
